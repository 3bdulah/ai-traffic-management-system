[project]
name = "traffic-shared"
version = "0.1.0"
description = "Shared types, constants, and utilities for the traffic management system"
requires-python = ">=3.9"
dependencies = [
    "pydantic>=2.0",
    "supabase>=2.0",
    "python-dotenv>=1.0",
]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"
